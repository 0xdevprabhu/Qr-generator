<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Magic – Stylish QR Code Generator</title>
    
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="100% Private in-browser custom QR code generator.">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <h1>QR Magic</h1>
                <p>Create beautiful custom QR codes</p>
            </div>
            <button id="btnReset" class="btn-reset">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Reset All
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="tab-container">
            <button id="tabSingle" class="tab-btn active">Single QR</button>
            <button id="tabBulk" class="tab-btn">Bulk Generate</button>
        </div>

        <div class="grid-layout">
            
            <div class="controls-area">
                
                <div id="sectionSingle" class="card block-section">
                    <h2>Content Data</h2>
                    
                    <div class="form-group">
                        <label>QR Type</label>
                        <select id="qrType" class="input-field">
                            <option value="url">Link / URL</option>
                            <option value="text">Plain Text</option>
                            <option value="wifi">Wi-Fi Network</option>
                            <option value="vcard">vCard / Contact</option>
                            <option value="email">Email Address</option>
                            <option value="phone">Phone Number</option>
                            <option value="sms">SMS Message</option>
                            <option value="geo">Geo Location</option>
                        </select>
                    </div>

                    <div id="inputGroups">
                        <div id="group-url" class="input-group block"><input type="text" id="valUrl" class="input-field" placeholder="https://example.com"></div>
                        <div id="group-text" class="input-group hidden"><textarea id="valText" class="input-field" rows="3" placeholder="Enter your text here..."></textarea></div>
                        <div id="group-wifi" class="input-group hidden grid-gap">
                            <input type="text" id="valWifiSsid" class="input-field" placeholder="Network Name (SSID)">
                            <input type="text" id="valWifiPass" class="input-field" placeholder="Password">
                            <select id="valWifiEnc" class="input-field">
                                <option value="WPA">WPA/WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">No Password</option>
                            </select>
                            <label class="checkbox-label"><input type="checkbox" id="valWifiHidden"> Hidden Network</label>
                        </div>
                        <div id="group-vcard" class="input-group hidden form-grid">
                            <input type="text" id="valVcardName" class="input-field span-2" placeholder="Full Name">
                            <input type="text" id="valVcardPhone" class="input-field" placeholder="Phone Number">
                            <input type="email" id="valVcardEmail" class="input-field" placeholder="Email Address">
                            <input type="text" id="valVcardCompany" class="input-field span-2" placeholder="Company">
                            <textarea id="valVcardAddress" class="input-field span-2" rows="2" placeholder="Full Address"></textarea>
                        </div>
                        <div id="group-email" class="input-group hidden grid-gap">
                            <input type="email" id="valEmailTo" class="input-field" placeholder="Recipient Email">
                            <input type="text" id="valEmailSub" class="input-field" placeholder="Subject">
                            <textarea id="valEmailBody" class="input-field" rows="2" placeholder="Message Body"></textarea>
                        </div>
                        <div id="group-phone" class="input-group hidden"><input type="tel" id="valPhone" class="input-field" placeholder="+1 234 567 8900"></div>
                        <div id="group-sms" class="input-group hidden grid-gap">
                            <input type="tel" id="valSmsPhone" class="input-field" placeholder="Phone Number">
                            <textarea id="valSmsMsg" class="input-field" rows="2" placeholder="Message"></textarea>
                        </div>
                        <div id="group-geo" class="input-group hidden form-grid">
                            <input type="number" step="any" id="valGeoLat" class="input-field" placeholder="Latitude">
                            <input type="number" step="any" id="valGeoLng" class="input-field" placeholder="Longitude">
                        </div>
                    </div>
                </div>

                <div id="sectionBulk" class="card block-section hidden">
                    <h2>Bulk Generation (Lines)</h2>
                    <p class="subtitle">Paste multiple lines of text or URLs. One QR per line.</p>
                    <textarea id="valBulk" class="input-field" rows="6" placeholder="https://example.com/1&#10;https://example.com/2"></textarea>
                    <button id="btnGenerateBulk" class="btn-primary mt-3">
                        <span>Generate Bulk QRs</span>
                        <div id="bulkSpinner" class="spinner hidden"></div>
                    </button>
                </div>

                <div class="card styling-card">
                    <button id="toggleStyle" class="accordion-header">
                        <h2>Design & Styling</h2>
                        <svg id="styleIcon" class="icon-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    
                    <div id="styleContent" class="accordion-content block">
                        <div class="form-grid">
                            <div>
                                <label>Foreground (Dots)</label>
                                <div class="color-picker-group">
                                    <input type="color" id="optColorDark" value="#000000" class="color-input">
                                    <input type="text" id="optColorDarkText" value="#000000" class="input-field">
                                </div>
                            </div>
                            <div>
                                <label>Background</label>
                                <div class="color-picker-group">
                                    <input type="color" id="optColorLight" value="#ffffff" class="color-input">
                                    <input type="text" id="optColorLightText" value="#ffffff" class="input-field">
                                </div>
                            </div>
                        </div>

                        <div class="gradient-box">
                            <label class="checkbox-label"><input type="checkbox" id="optGradEnable"> Enable Foreground Gradient</label>
                            <div id="gradControls" class="form-grid hidden faded">
                                <select id="optGradType" class="input-field span-2">
                                    <option value="linear">Linear Gradient</option>
                                    <option value="radial">Radial Gradient</option>
                                </select>
                                <div><label>Color 1</label><input type="color" id="optGrad1" value="#4f46e5" class="color-input full-width"></div>
                                <div><label>Color 2</label><input type="color" id="optGrad2" value="#9333ea" class="color-input full-width"></div>
                            </div>
                        </div>

                        <div class="form-grid grid-3">
                            <div><label>Dots Style</label><select id="optDots" class="input-field"><option value="square">Square</option><option value="dots">Dots</option><option value="rounded">Rounded</option><option value="classy">Classy</option><option value="classy-rounded">Classy Rounded</option><option value="extra-rounded">Extra Rounded</option></select></div>
                            <div><label>Corner Square</label><select id="optCornerSquare" class="input-field"><option value="square">Square</option><option value="dot">Dot</option><option value="extra-rounded">Extra Rounded</option></select></div>
                            <div><label>Corner Dot</label><select id="optCornerDot" class="input-field"><option value="square">Square</option><option value="dot">Dot</option></select></div>
                        </div>

                        <div class="form-grid">
                            <div><label>Error Correction</label><select id="optErrorLevel" class="input-field"><option value="L">Low (7%)</option><option value="M">Medium (15%)</option><option value="Q" selected>Quarter (25%)</option><option value="H">High (30%)</option></select></div>
                            <div><label>Output Size: <span id="lblSize">400</span>px</label><input type="range" id="optSize" min="200" max="1000" step="50" value="400" class="range-slider"></div>
                        </div>

                        <div class="logo-upload-box">
                            <label>Center Logo / Image</label>
                            <div class="flex-row">
                                <label class="file-upload-btn">
                                    <input type="file" id="optLogoFile" accept="image/*" hidden> Upload Image
                                </label>
                                <button id="btnClearLogo" class="btn-text-danger hidden">Remove</button>
                            </div>
                            <div class="form-grid mt-3">
                                <div><label>Image Margin</label><input type="number" id="optLogoMargin" value="5" min="0" max="50" class="input-field"></div>
                                <div><label>Image Scale (%)</label><input type="number" id="optLogoScale" value="40" min="10" max="80" class="input-field"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-area">
                <div class="sticky-preview card block-section">
                    <h3 class="preview-title">Live Preview</h3>
                    <div id="qrPreview" class="qr-render-box"></div>
                    
                    <div id="actionsSingle" class="action-buttons">
                        <button id="btnCopy" class="btn-secondary">Copy to Clipboard</button>
                        <div class="form-grid">
                            <button id="btnDlPng" class="btn-primary">Download PNG</button>
                            <button id="btnDlSvg" class="btn-accent">Download SVG</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="sectionBulkResults" class="bulk-results hidden">
            <div class="bulk-header">
                <h2>Generated QR Codes (<span id="bulkCount">0</span>)</h2>
                <button id="btnDlZip" class="btn-primary">Download All as ZIP</button>
            </div>
            <div id="bulkGrid" class="bulk-grid"></div>
        </div>

    </main>

    <footer class="app-footer"><p>Made with ❤️ – 100% Private in Browser</p></footer>
    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
